<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Reclass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 50px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #ccc;
            border: 3px solid var(--primary-color);
        }
        .profile-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .full-width {
            grid-column: span 2;
        }
        .profile-actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <div class="logo">
                <img src="imgs/wizlog.webp" alt="Wiz Logo" onerror="this.src='https://via.placeholder.com/150x50?text=Wiz+Logo'">
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="dashboard-aluno.html">Meu Painel</a></li>
                    <li><a href="selecao-login.html" class="btn-nav">Sair</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-pic">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <h2>João Silva</h2>
                    <p>Aluno - Nível Intermediário</p>
                </div>
            </div>

            <form class="profile-form">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" value="João Silva">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" value="joao.silva@email.com">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" value="(11) 98888-7777">
                </div>
                <div class="form-group">
                    <label>Unidade Preferencial</label>
                    <input type="text" value="Unidade Centro">
                </div>
                <div class="form-group full-width">
                    <label>Nova Senha</label>
                    <input type="password" placeholder="Deixe em branco para não alterar">
                </div>
                <div class="profile-actions full-width">
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    <button type="button" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Reclass - Sistema de Reposição de Aulas. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
