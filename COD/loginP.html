<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Professor | Reclass</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header class="padheader">
        <div class="container vis-btn-logo">
            <div class="logo">
                <img src="IMGS/reclasslogo.jpeg" alt="Wiz Logo" onerror="this.src='https://via.placeholder.com/150x50?text=Wiz+Logo'">
            </div>
            <nav class="btns-header">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="loginA.html">Sou Aluno</a></li>
                    <li><a href="aulas.html" class="bt-age">Agendamento</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-toggle" aria-label="Abrir menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main>
        <section class="pad-log">
            <div class="login-container">
                <h2>Login do Professor</h2>
                <form action="#">
                    <div class="form-group">
                        <label for="matricula"><i class="fas fa-id-card"></i> Código</label>
                        <input type="text" id="codigo" placeholder="Seu Código" required>
                    </div>
                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Senha</label>
                        <input type="password" id="password" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login">Entrar no Painel</button>
                </form>
                <div class="login-footer">
                    <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Reclass - Sistema de Reposição de Aulas</p>
        </div>
    </footer>
</body>
</html>
